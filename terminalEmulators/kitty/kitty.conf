# theme
# https://github.com/dexpota/kitty-themes
include ./theme.conf

# bold_font        'MesloLGS NF Bold'
# italic_font      'MesloLGS NF Italic' 
# bold_italic_font 'MesloLGS NF Bold Italic' 
# font_family      RecMonoCasualNerdFontMono
# bold_font        auto
# italic_font      auto
# bold_italic_font auto

font_size 12.0


# Move the active window to the indicated screen edge
map ctrl+shift+up layout_action move_to_screen_edge top
map ctrl+shift+left layout_action move_to_screen_edge left
map ctrl+shift+right layout_action move_to_screen_edge right
map ctrl+shift+down layout_action move_to_screen_edge bottom

enabled_layouts horizontal, stack
# to make zsh default shell enter
# $ chsh -s $(which zsh)

enable_audio_bell no

# Make Option key work as Alt for shortcuts
macos_option_as_alt yes

# remove tabs
map kitty_mod+space no_op
map kitty_super+space no_op
map kitty_mod+space
map kitty_super+space

# Cycle windows with Cmd+B
map cmd+b next_window

# Cmd+N  -> focus tab N            (was: focus pane N within a tab)
# Ctrl+Shift+N -> move focused pane to tab N
# Tab indices are 0-based for the remote-control detach, hence index:(N-1).
# state:focused_os_window scopes the target tab to the OS window you're in
# (otherwise index:0 ambiguously matches the first tab of every OS window).
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9

map ctrl+shift+1 launch --type=background kitten @ detach-window --match state:focused --target-tab "state:focused_os_window and index:0"
map ctrl+shift+2 launch --type=background kitten @ detach-window --match state:focused --target-tab "state:focused_os_window and index:1"
map ctrl+shift+3 launch --type=background kitten @ detach-window --match state:focused --target-tab "state:focused_os_window and index:2"
map ctrl+shift+4 launch --type=background kitten @ detach-window --match state:focused --target-tab "state:focused_os_window and index:3"
map ctrl+shift+5 launch --type=background kitten @ detach-window --match state:focused --target-tab "state:focused_os_window and index:4"
map ctrl+shift+6 launch --type=background kitten @ detach-window --match state:focused --target-tab "state:focused_os_window and index:5"
map ctrl+shift+7 launch --type=background kitten @ detach-window --match state:focused --target-tab "state:focused_os_window and index:6"
map ctrl+shift+8 launch --type=background kitten @ detach-window --match state:focused --target-tab "state:focused_os_window and index:7"
map ctrl+shift+9 launch --type=background kitten @ detach-window --match state:focused --target-tab "state:focused_os_window and index:8"

# Copy current path with "cd " prefix to clipboard (Cmd+Shift+P)
map cmd+shift+p launch --type=background --cwd=current sh -c 'printf "cd %s" "$(pwd)" | pbcopy'

# Open split window with current directory
map cmd+enter launch --cwd=current --type=window

# Zoom current split to fill the window (toggle)
map cmd+shift+f toggle_layout stack

# Tab title shows layout + window count so zoomed-stack is visually distinct from being alone.
#   [H1] zsh   -> horizontal, 1 window (alone in tab)
#   [H3] zsh   -> horizontal, 3 windows
#   [S3] zsh   -> stack (zoomed), 3 windows hiding behind — shown in red
tab_title_template "{fmt.fg.red if layout_name == 'stack' else fmt.fg.yellow}[{layout_name[:1].upper()}{num_windows}]{fmt.fg.default} {title}"




# BEGIN_KITTY_FONTS
font_family      family="RecMonoCasual Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
# triage
allow_remote_control yes
listen_on unix:/tmp/kitty-$KITTY_PID
