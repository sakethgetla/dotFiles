# theme
# https://github.com/dexpota/kitty-themes
include ./theme.conf

# bold_font        'MesloLGS NF Bold'
# italic_font      'MesloLGS NF Italic' 
# bold_italic_font 'MesloLGS NF Bold Italic' 
# font_family      RecMonoCasualNerdFontMono
# bold_font        auto
# italic_font      auto
# bold_italic_font auto

font_size 12.0


# Move the active window to the indicated screen edge
map ctrl+shift+up layout_action move_to_screen_edge top
map ctrl+shift+left layout_action move_to_screen_edge left
map ctrl+shift+right layout_action move_to_screen_edge right
map ctrl+shift+down layout_action move_to_screen_edge bottom

enabled_layouts horizontal, stack
# to make zsh default shell enter
# $ chsh -s $(which zsh)

enable_audio_bell no

# Make Option key work as Alt for shortcuts
macos_option_as_alt yes

# remove tabs
map kitty_mod+space no_op
map kitty_super+space no_op
map kitty_mod+space
map kitty_super+space

# Cycle windows with Cmd+B
map cmd+b next_window

# Copy current path with "cd " prefix to clipboard (Cmd+Shift+P)
map cmd+shift+p launch --type=background --cwd=current sh -c 'printf "cd %s" "$(pwd)" | pbcopy'

# Open split window with current directory
map cmd+enter launch --cwd=current --type=window

# Zoom current split to fill the window (toggle)
map cmd+shift+f toggle_layout stack

# Tab title shows layout + window count so zoomed-stack is visually distinct from being alone.
#   [H1] zsh   -> horizontal, 1 window (alone in tab)
#   [H3] zsh   -> horizontal, 3 windows
#   [S3] zsh   -> stack (zoomed), 3 windows hiding behind — shown in red
tab_title_template "{fmt.fg.red if layout_name == 'stack' else fmt.fg.yellow}[{layout_name[:1].upper()}{num_windows}]{fmt.fg.default} {title}"




# BEGIN_KITTY_FONTS
font_family      family="RecMonoCasual Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
# triage
allow_remote_control yes
listen_on unix:/tmp/kitty-$KITTY_PID
